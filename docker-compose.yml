version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ai-stream-backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - VOICE_ID_ELENA=${VOICE_ID_ELENA:-21m00Tcm4TlvDq8ikWAM}
      - VOICE_ID_MARCUS=${VOICE_ID_MARCUS:-29vD33N1CtxCmqQRPOHJ}
    volumes:
      - ./logs:/app/logs
      - ./audio:/app/audio
      - ./avatars:/app/avatars
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - ai-stream-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ai-stream-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - ai-stream-network

networks:
  ai-stream-network:
    driver: bridge
